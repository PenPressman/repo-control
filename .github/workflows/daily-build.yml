name: Daily Project Builder

on:
  schedule:
    # 13:00 UTC daily
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

env:
  # Upper bound on Claude Code turns per invocation, used for both the
  # research step and the build step, to control cost/time.
  CLAUDE_MAX_TURNS: "30"

jobs:
  build-serious:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRACK: serious
      PROMPT_FILE: prompts/build-serious.md
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI and gitleaks
        run: |
          npm install -g @anthropic-ai/claude-code
          GITLEAKS_VERSION="8.18.4"
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Verify gh CLI authentication
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh auth status

      - name: Run research + build + gate + publish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          bash scripts/run-track.sh

      - name: Upload run artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serious-track-failure-${{ github.run_id }}
          path: /tmp/daily-build-serious/
          retention-days: 7

  build-fun:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TRACK: fun
      PROMPT_FILE: prompts/build-fun.md
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI and gitleaks
        run: |
          npm install -g @anthropic-ai/claude-code
          GITLEAKS_VERSION="8.18.4"
          curl -sSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Verify gh CLI authentication
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh auth status

      - name: Run research + build + gate + publish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          bash scripts/run-track.sh

      - name: Upload run artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fun-track-failure-${{ github.run_id }}
          path: /tmp/daily-build-fun/
          retention-days: 7

  notify:
    needs: [build-serious, build-fun]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Pull latest dashboard
        # build-serious/build-fun may have each pushed a dashboard commit
        # after this job's checkout was triggered; pull to see both.
        run: git pull origin ${{ github.ref_name }}

      - name: Build email summary
        id: summary
        run: |
          DATE_STR=$(date -u +%Y-%m-%d)
          bash scripts/build-email-summary.sh log/dashboard.md "$DATE_STR" > /tmp/summary.txt
          {
            echo "date=${DATE_STR}"
            echo "body<<EOF"
            cat /tmp/summary.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Email daily summary
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "Daily Project Builder — ${{ steps.summary.outputs.date }}"
          to: ${{ secrets.EMAIL_TO || secrets.EMAIL_USER }}
          from: ${{ secrets.EMAIL_USER }}
          body: ${{ steps.summary.outputs.body }}
